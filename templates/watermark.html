<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000, height=1000, initial-scale=1">
<title>Eikon - Watermark</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4;
    --acento: #43b5a6; --acento-2: #8d7cc0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1000px; height: 1000px; overflow: hidden; }
  body {
    background-color: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  body[data-variant="v1_light"] { --bg: #0b1417; }
  body[data-variant="v2_dark"]  { --bg: #f4f1ea; }

  .symbol-wrap {
    width: 700px; height: 700px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .symbol-wrap svg { width: 100%; height: 100%; }
  .symbol-wrap img { width: 100%; height: 100%; object-fit: contain; }

  body[data-variant="v1_light"] .symbol-wrap svg * {
    stroke: #e8e0d4; fill: #e8e0d4; opacity: 0.12;
  }
  body[data-variant="v2_dark"] .symbol-wrap svg * {
    stroke: #0b1417; fill: #0b1417; opacity: 0.08;
  }

  /* Apply isotype procedural styling when injected */
  body[data-isotype-uri] .symbol-wrap img {
    filter: opacity(0.12);
  }
  body[data-variant="v2_dark"] .symbol-wrap img {
    filter: opacity(0.08);
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="symbol-wrap" data-isotype-container>
    <!-- Fallback SVG: replaced by procedural isotype if available -->
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke-width="2"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke-width="1" opacity="0.5"/>
      <line x1="7" y1="25" x2="93" y2="75" stroke-width="1" opacity="0.5"/>
      <line x1="93" y1="25" x2="7" y2="75" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="3"/>
      <circle cx="50" cy="5" r="2"/><circle cx="93" cy="25" r="2"/>
      <circle cx="93" cy="75" r="2"/><circle cx="50" cy="95" r="2"/>
      <circle cx="7" cy="75" r="2"/><circle cx="7" cy="25" r="2"/>
    </svg>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-logo-simbolo></span>
  </div>
</body>
</html>
