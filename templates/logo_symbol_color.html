<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --acento: #43b5a6;
    --acento-2: #8d7cc0;
    --acento-3: #A3E4D7;
    --grad-hero: linear-gradient(135deg, #43b5a6 0%, #8d7cc0 60%, #4a3a80 100%);
    --grad-text: var(--grad-hero);
    --font-titulo: "Playfair Display", Georgia, "Times New Roman", serif;
    --font-simbolo: var(--font-titulo);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .layout {
    display: flex;
    width: 70%;
    height: 70%;
    align-items: center;
    justify-content: center;
  }
  .simbolo {
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: var(--font-simbolo);
    font-size: 290px;
    font-weight: 900;
    line-height: 1;
    background: var(--grad-text);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>
  <main class="layout">
    <span class="simbolo" data-logo-simbolo data-fit data-fit-min="132"></span>
  </main>
</body>
</html>
