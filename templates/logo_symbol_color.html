<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Importa @font-face de las familias empaquetadas (eje typography_pairing). -->
<link rel="stylesheet" href="eikon-system.css">
<style>
  /*
   * logo_symbol_color — tile de logo combinatorio.
   * NO pertenece a la taxonomía golden: existe para demostrar variedad en los ejes
   * palette_scheme x background_treatment x corner_shape x typography_pairing.
   * Tokens (--bg, --texto, --acento, --primario, --corner-radius, --font-titulo) y
   * data-bg-treatment son inyectados por eikon_core/injection.py en tiempo de render.
   * Clases con prefijo eik- para no colisionar con selectores de eikon-system.css.
   */
  :root {
    /* Lienzo exterior fijo: contrasta con la tarjeta en cualquier paleta, de modo que
       el corner_radius revele las esquinas (sharp vs rounded => píxeles distintos). */
    --eik-canvas: #2a2f33;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 512px;
    height: 512px;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--eik-canvas);
  }

  .eik-card {
    position: relative;
    width: 432px;
    height: 432px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    overflow: hidden;
    /* solid: color plano de fondo (palette_scheme controla --bg). */
    background: var(--bg, #0b1417);
    /* corner_shape controla el radio (sharp=0, rounded=14px, pill=999px). */
    border-radius: var(--corner-radius, 0);
  }

  /* background_treatment: solid vs gradient.
     El gradiente mezcla --bg -> --acento -> --primario, garantizando que difiera del
     plano en TODAS las paletas (incluso mono, donde --acento se vuelve claro pero
     --primario permanece oscuro). */
  body[data-bg-treatment="solid"] .eik-card {
    background: var(--bg, #0b1417);
  }
  body[data-bg-treatment="gradient"] .eik-card {
    background: linear-gradient(135deg,
      var(--bg, #0b1417) 0%,
      var(--acento, #43b5a6) 55%,
      var(--primario, #0b1417) 100%);
  }

  .eik-symbol {
    font-family: var(--font-titulo, "Playfair Display"), Georgia, serif;
    font-weight: 700;
    font-size: 196px;
    line-height: 1;
    color: var(--texto, #e8e0d4);
  }
  .eik-wordmark {
    font-family: var(--font-titulo, "Playfair Display"), Georgia, serif;
    font-weight: 700;
    font-size: 46px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--texto, #e8e0d4);
    text-align: center;
    max-width: 88%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Marca de acento: distingue mono (acento == fondo, se funde) de light (acento de
     marca visible). Usa --acento inyectado. */
  .eik-accent {
    width: 64px;
    height: 10px;
    border-radius: 999px;
    background: var(--acento, #43b5a6);
  }
</style>
</head>
<body>
  <main class="eik-card">
    <span class="eik-symbol" data-logo-simbolo></span>
    <span class="eik-wordmark" data-logo-texto></span>
    <span class="eik-accent" aria-hidden="true"></span>
  </main>
</body>
</html>
