<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1050, height=600, initial-scale=1">
<title>Eikon - Business Card</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4; --primario: #0b1417;
    --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif; --font-cuerpo: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1050px; height: 600px; overflow: hidden; }

  /* ── FRONT (v1_front) ── */
  body[data-variant="v1_front"] {
    background: var(--bg);
    font-family: var(--font-cuerpo); color: var(--texto);
    display: grid; grid-template-columns: 480px 1fr;
    align-items: center; padding: 0;
  }
  body[data-variant="v1_front"] .left-col {
    background: linear-gradient(135deg, var(--acento) 0%, rgba(67, 181, 166, 0.85) 100%);
    display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 60px 40px; position: relative; overflow: hidden;
  }
  body[data-variant="v1_front"] .left-col::before {
    content: ''; position: absolute; top: -40%; right: -20%;
    width: 380px; height: 380px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.06); pointer-events: none; z-index: 0;
  }
  body[data-variant="v1_front"] [data-isotype-container] {
    width: 320px; height: 320px; position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }
  body[data-variant="v1_front"] [data-isotype-container] svg {
    width: 100%; height: 100%; filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.35));
  }
  body[data-variant="v1_front"] .right-col {
    padding: 60px 50px; display: flex; flex-direction: column;
    justify-content: center; gap: 28px;
  }
  body[data-variant="v1_front"] .logo-text {
    font-family: var(--font-titulo); font-size: 62px; font-weight: 800;
    line-height: 1; color: var(--texto); letter-spacing: -0.02em;
  }
  body[data-variant="v1_front"] .subtitle {
    font-size: 17px; font-weight: 600; color: var(--acento);
    letter-spacing: 0.045em; text-transform: uppercase;
  }
  body[data-variant="v1_front"] .accent-line {
    width: 56px; height: 3px; border-radius: 1.5px;
    background: linear-gradient(90deg, var(--acento), var(--acento-2));
  }
  body[data-variant="v1_front"] .copy {
    font-size: 14px; font-weight: 400; color: #a0b3b0;
    line-height: 1.65; max-width: 380px;
  }
  body[data-variant="v1_front"] .back-layout { display: none; }

  /* ── BACK (v2_back) ── */
  body[data-variant="v2_back"] {
    background: var(--bg); color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 0; padding: 50px;
    position: relative;
  }
  body[data-variant="v2_back"]::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 30%, rgba(67, 181, 166, 0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body[data-variant="v2_back"] .front-layout { display: none; }
  body[data-variant="v2_back"] .back-layout {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 24px; position: relative; z-index: 1;
    background: linear-gradient(135deg, rgba(67, 181, 166, 0.1) 0%, rgba(141, 124, 192, 0.06) 100%);
    border: 1px solid rgba(67, 181, 166, 0.22); border-radius: 14px;
    padding: 50px 60px; width: 100%; max-width: 950px;
  }
  body[data-variant="v2_back"] [data-isotype-container] {
    width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
  }
  body[data-variant="v2_back"] [data-isotype-container] svg {
    width: 100%; height: 100%;
  }
  body[data-variant="v2_back"] .back-info {
    text-align: center; display: flex; flex-direction: column;
    gap: 12px; align-items: center;
  }
  body[data-variant="v2_back"] .back-name {
    font-family: var(--font-titulo); font-size: 28px; font-weight: 800;
    color: var(--texto); letter-spacing: -0.01em;
  }
  body[data-variant="v2_back"] .back-tag {
    font-size: 12px; font-weight: 600; color: var(--acento);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  body[data-variant="v2_back"] .accent-line-sep {
    width: 2px; height: 36px;
    background: linear-gradient(180deg, var(--acento), rgba(67, 181, 166, 0.2));
  }
  body[data-variant="v2_back"] .back-url {
    font-size: 14px; font-weight: 500; color: #a0b3b0;
    letter-spacing: 0.02em; text-align: center;
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <!-- FRONT layout -->
  <div class="front-layout left-col">
    <div data-isotype-container>
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f5f5f5"/>
          </linearGradient>
        </defs>
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke="url(#bcGrad)" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke="url(#bcGrad)" stroke-width="1" opacity="0.65"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke="url(#bcGrad)" stroke-width="1" opacity="0.65"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke="url(#bcGrad)" stroke-width="1" opacity="0.65"/>
        <circle cx="50" cy="50" r="3" fill="#ffffff"/>
        <circle cx="50" cy="5" r="2.5" fill="#ffffff"/>
        <circle cx="93" cy="25" r="2.5" fill="#f5f5f5"/>
        <circle cx="93" cy="75" r="2.5" fill="#f5f5f5"/>
        <circle cx="50" cy="95" r="2.5" fill="#ffffff"/>
        <circle cx="7" cy="75" r="2.5" fill="#f5f5f5"/>
        <circle cx="7" cy="25" r="2.5" fill="#f5f5f5"/>
      </svg>
    </div>
  </div>
  <div class="front-layout right-col">
    <h1 class="logo-text" data-logo-texto data-fit data-fit-min="24">Kósmos</h1>
    <div class="accent-line"></div>
    <p class="subtitle" data-subtitulo data-fit data-fit-min="10">Simulación del orden natural</p>
    <p class="copy" data-copy data-fit data-fit-min="10">Catálogo educativo de sistemas complejos, emergencia y filosofía de la ciencia</p>
  </div>

  <!-- BACK layout -->
  <div class="back-layout">
    <div data-isotype-container>
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bcGradBack" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#43b5a6"/><stop offset="100%" stop-color="#8d7cc0"/>
          </linearGradient>
        </defs>
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke="url(#bcGradBack)" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke="url(#bcGradBack)" stroke-width="1" opacity="0.5"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke="url(#bcGradBack)" stroke-width="1" opacity="0.5"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke="url(#bcGradBack)" stroke-width="1" opacity="0.5"/>
        <circle cx="50" cy="50" r="3" fill="#43b5a6"/>
        <circle cx="50" cy="5" r="2.5" fill="#43b5a6"/>
        <circle cx="93" cy="25" r="2.5" fill="#8d7cc0"/>
        <circle cx="93" cy="75" r="2.5" fill="#8d7cc0"/>
        <circle cx="50" cy="95" r="2.5" fill="#43b5a6"/>
        <circle cx="7" cy="75" r="2.5" fill="#8d7cc0"/>
        <circle cx="7" cy="25" r="2.5" fill="#8d7cc0"/>
      </svg>
    </div>
    <div class="back-info">
      <span class="back-name" data-logo-texto>Kósmos</span>
      <span class="back-tag" data-subtitulo>Simulación del orden natural</span>
    </div>
    <div class="accent-line-sep"></div>
    <div class="back-url" data-url data-fit data-fit-min="10">kosmos.stevenvallejo.com</div>
  </div>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span><span data-subtitulo></span><span data-copy></span>
    <span data-logo-simbolo></span><span data-logo-texto></span>
    <span data-numero></span><span data-etiqueta></span><span data-url></span>
  </div>
</body>
</html>
