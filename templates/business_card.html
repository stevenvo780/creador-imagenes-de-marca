<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1050, height=600, initial-scale=1">
<title>Eikon - Business Card</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4; --primario: #0b1417;
    --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif; --font-cuerpo: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1050px; height: 600px; overflow: hidden; }

  /* ── FRONT (v1_front) ── */
  body[data-variant="v1_front"] {
    background: #0b1417;
    font-family: var(--font-cuerpo); color: var(--texto);
    display: grid; grid-template-columns: 340px 1fr; align-items: center;
    padding: 0;
  }
  body[data-variant="v1_front"] .left-col {
    background: linear-gradient(180deg, rgba(67, 181, 166, 0.1) 0%, transparent 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 50px 30px; height: 100%;
  }
  body[data-variant="v1_front"] .left-col svg { width: 180px; height: 180px; }
  body[data-variant="v1_front"] .right-col {
    padding: 50px 40px;
    display: flex; flex-direction: column; justify-content: center; gap: 18px;
  }
  body[data-variant="v1_front"] .logo-text {
    font-family: var(--font-titulo); font-size: 44px; font-weight: 700;
    line-height: 1.1; color: #e8e0d4;
  }
  body[data-variant="v1_front"] .subtitle {
    font-size: 16px; font-weight: 500; color: #a3c4c0;
    letter-spacing: 0.03em;
  }
  body[data-variant="v1_front"] .accent-line {
    width: 48px; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, var(--acento), var(--acento-2));
  }
  body[data-variant="v1_front"] .copy {
    font-size: 14px; font-weight: 400; color: #b5c4c0;
    line-height: 1.55; max-width: 340px;
  }
  body[data-variant="v1_front"] .back-layout { display: none; }

  /* ── BACK (v2_back) ── */
  body[data-variant="v2_back"] {
    background: #f4f1ea; color: #0b1417;
    font-family: var(--font-cuerpo);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 60px;
  }
  body[data-variant="v2_back"] .front-layout { display: none; }
  body[data-variant="v2_back"] .back-layout {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; gap: 40px;
  }
  body[data-variant="v2_back"] .back-left {
    display: flex; align-items: center; gap: 20px;
  }
  body[data-variant="v2_back"] .back-left svg { width: 70px; height: 70px; }
  body[data-variant="v2_back"] .back-left svg * { stroke: #0b1417; }
  body[data-variant="v2_back"] .back-left svg circle { fill: #0b1417; }
  body[data-variant="v2_back"] .back-info {
    display: flex; flex-direction: column; gap: 4px;
  }
  body[data-variant="v2_back"] .back-name {
    font-family: var(--font-titulo); font-size: 18px; font-weight: 700;
    color: #0b1417; letter-spacing: 0.02em;
  }
  body[data-variant="v2_back"] .back-tag {
    font-size: 13px; font-weight: 500; color: #1a2a25;
    letter-spacing: 0.03em;
  }
  body[data-variant="v2_back"] .back-url {
    font-size: 16px; font-weight: 600; color: #0d5c4a;
    text-align: right; letter-spacing: 0.02em;
  }
  body[data-variant="v2_back"] .accent-line {
    width: 1px; height: 60px; border-radius: 1px;
    background: linear-gradient(180deg, var(--acento), var(--acento-2));
    margin: 0 30px;
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <!-- FRONT layout -->
  <div class="front-layout left-col">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#43b5a6"/><stop offset="100%" stop-color="#8d7cc0"/>
        </linearGradient>
      </defs>
      <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke="url(#bcGrad)" stroke-width="2.5"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke="url(#bcGrad)" stroke-width="1" opacity="0.5"/>
      <line x1="7" y1="25" x2="93" y2="75" stroke="url(#bcGrad)" stroke-width="1" opacity="0.5"/>
      <line x1="93" y1="25" x2="7" y2="75" stroke="url(#bcGrad)" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="3" fill="#43b5a6"/>
      <circle cx="50" cy="5" r="2.5" fill="#43b5a6"/>
      <circle cx="93" cy="25" r="2.5" fill="#8d7cc0"/>
      <circle cx="93" cy="75" r="2.5" fill="#8d7cc0"/>
      <circle cx="50" cy="95" r="2.5" fill="#43b5a6"/>
      <circle cx="7" cy="75" r="2.5" fill="#8d7cc0"/>
      <circle cx="7" cy="25" r="2.5" fill="#8d7cc0"/>
    </svg>
  </div>
  <div class="front-layout right-col">
    <h1 class="logo-text" data-logo-texto data-fit data-fit-min="24">Kósmos</h1>
    <div class="accent-line"></div>
    <p class="subtitle" data-subtitulo data-fit data-fit-min="10">Simulación del orden natural · Pinakothḗke</p>
    <p class="copy" data-copy data-fit data-fit-min="10">Catálogo educativo de sistemas complejos, emergencia y filosofía de la ciencia</p>
  </div>

  <!-- BACK layout -->
  <div class="back-layout">
    <div class="back-left">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke="#0b1417" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke="#0b1417" stroke-width="1" opacity="0.4"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke="#0b1417" stroke-width="1" opacity="0.4"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke="#0b1417" stroke-width="1" opacity="0.4"/>
        <circle cx="50" cy="50" r="3" fill="#0b1417"/>
        <circle cx="50" cy="5" r="2" fill="#0b1417"/><circle cx="93" cy="25" r="2" fill="#0b1417"/>
        <circle cx="93" cy="75" r="2" fill="#0b1417"/><circle cx="50" cy="95" r="2" fill="#0b1417"/>
        <circle cx="7" cy="75" r="2" fill="#0b1417"/><circle cx="7" cy="25" r="2" fill="#0b1417"/>
      </svg>
      <div class="back-info">
        <span class="back-name" data-logo-texto>Kósmos</span>
        <span class="back-tag" data-subtitulo>Simulación del orden natural</span>
      </div>
    </div>
    <div class="accent-line"></div>
    <div class="back-url" data-url data-fit data-fit-min="10">kosmos.stevenvallejo.com</div>
  </div>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span><span data-subtitulo></span><span data-copy></span>
    <span data-logo-simbolo></span><span data-logo-texto></span>
    <span data-numero></span><span data-etiqueta></span><span data-url></span>
  </div>
</body>
</html>
