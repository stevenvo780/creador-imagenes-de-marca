<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #0b1417;
    --texto: #e8e0d4;
    --font-titulo: 'Playfair Display', Georgia, serif;
  }
  body {
    width: 600px; height: 600px;
    background: var(--bg); color: var(--texto);
    overflow: hidden; position: relative;
  }

  .layout {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }

  .simbolo {
    font-family: var(--font-titulo); font-size: 320px; font-weight: 900; line-height: 1;
    color: var(--texto);
    opacity: 0.92;
    display: flex; align-items: center; justify-content: center;
    width: 460px; height: 380px; text-align: center;
  }
</style>
</head>
<body>
<div class="layout">
  <span class="simbolo" data-logo-simbolo data-fit data-fit-min="170"></span>
</div>
</body>
</html>
