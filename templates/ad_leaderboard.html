<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=728, height=90, initial-scale=1">
<title>Eikon - Ad Leaderboard</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4; --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif; --font-cuerpo: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 728px; height: 90px; overflow: hidden; }
  body {
    background-color: var(--bg); color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex; align-items: center;
    padding: 0 20px;
  }
  body[data-variant="v1_brand"]     { --bg: #0b1417; --texto: #e8e0d4; }
  body[data-variant="v2_promo"]     { --bg: #131e22; --texto: #e8e0d4; }
  body[data-variant="v3_cta_driven"] { --bg: #0a0f12; --texto: #e8e0d4; }

  .container {
    display: flex; align-items: center; gap: 14px; width: 100%; height: 100%;
  }
  body[data-variant="v3_cta_driven"] .container {
    border-left: 5px solid #43b5a6;
    padding-left: 15px;
  }
  .symbol-wrap { flex-shrink: 0; width: 48px; height: 48px; }
  .symbol-wrap svg { width: 100%; height: 100%; }
  .symbol-wrap svg * { stroke: url(#lbGrad); }

  .text-block { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .headline {
    font-family: var(--font-titulo); font-size: 18px; font-weight: 700;
    color: var(--texto); line-height: 1.2; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .subhead {
    font-size: 11px; font-weight: 400; color: #a3c4c0; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* v1_brand: autoridad — sin CTA, solo URL */
  body[data-variant="v1_brand"] .headline { color: #e8e0d4; }
  body[data-variant="v1_brand"] .subhead { color: #8fa3a8; }
  body[data-variant="v1_brand"] .cta { display: none; }

  /* v2_promo: beneficio — CTA dorado */
  body[data-variant="v2_promo"] .headline { color: #a3e4d7; }
  body[data-variant="v2_promo"] .subhead { color: #c4b8e8; }
  body[data-variant="v2_promo"] .cta { background: #e0a85e; color: #0b1417; }

  /* v3_cta_driven: social proof/data — CTA gradiente */
  body[data-variant="v3_cta_driven"] .headline {
    /* WCAG AA fix: gradient end was --acento-2 (#2a7a70 gives 4.26:1 on #0a0f12); now uses #A3E4D7 end (13.4:1) */
    background: linear-gradient(90deg, var(--acento), #A3E4D7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
  }
  body[data-variant="v3_cta_driven"] .subhead { color: #b8d4d0; }
  body[data-variant="v3_cta_driven"] .cta {
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 800;
    letter-spacing: 0.03em;
  }

  .cta {
    flex-shrink: 0;
    font-size: 11px; font-weight: 700; color: var(--bg);
    background: linear-gradient(90deg, var(--acento), var(--acento-2));
    padding: 6px 14px; border-radius: 4px; white-space: nowrap;
    text-decoration: none; letter-spacing: 0.02em;
  }
  .url {
    font-size: 10px; opacity: 0.6; color: var(--texto); white-space: nowrap;
  }
  body[data-variant="v2_promo"] .url,
  body[data-variant="v3_cta_driven"] .url { display: none; }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="container">
    <div class="symbol-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#43b5a6"/><stop offset="100%" stop-color="#8d7cc0"/>
          </linearGradient>
        </defs>
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke-width="1" opacity="0.5"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke-width="1" opacity="0.5"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke-width="1" opacity="0.5"/>
        <circle cx="50" cy="50" r="3"/><circle cx="50" cy="5" r="2.5"/>
        <circle cx="93" cy="25" r="2.5"/><circle cx="93" cy="75" r="2.5"/>
        <circle cx="50" cy="95" r="2.5"/><circle cx="7" cy="75" r="2.5"/><circle cx="7" cy="25" r="2.5"/>
      </svg>
    </div>
    <div class="text-block">
      <h1 class="headline" data-titulo data-fit data-fit-min="10">Catálogo de simulación científica</h1>
      <span class="subhead" data-copy data-fit data-fit-min="8">16 repos · 22 simulaciones ejecutables · Open source</span>
    </div>
    <span class="url" data-url data-fit data-fit-min="8">kosmos.stevenvallejo.com</span>
    <span class="cta">Explorar →</span>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span><span data-copy></span><span data-url></span>
    <span data-logo-texto></span>
  </div>
</body>
</html>
