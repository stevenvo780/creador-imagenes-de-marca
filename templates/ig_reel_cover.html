<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1">
<title>Eikon - IG Reel Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primario: #0b1417;
    --acento-2: #8d7cc0;
    --texto: #e8e0d4;
    --bg: #0b1417;
    --gradient-hero: linear-gradient(135deg, #43b5a6, #8d7cc0);
    --font-titulo: 'Playfair Display', Georgia, serif;
    --font-cuerpo: 'Inter', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 80px;
  }

  /* VARIANTES */
  body[data-variant="v1_hook"] { border-left: 20px solid var(--acento-2); }
  body[data-variant="v2_tutorial"] { border: 8px solid var(--acento-2); }
  body[data-variant="v3_story"] { background: linear-gradient(135deg, var(--bg), rgba(141, 124, 192, 0.1)); }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    width: 100%;
    text-align: center;
  }

  .title {
    font-family: var(--font-titulo);
    font-size: 140px;
    font-weight: 700;
    line-height: 1.1;
  }

  .copy {
    font-size: 84px;
    line-height: 1.4;
  }

  .subtitle {
    font-size: 56px;
    line-height: 1.3;
  }

  .symbol {
    font-size: 160px;
    font-weight: 700;
  }

  .footer {
    margin-top: auto;
    font-size: 56px;
    font-weight: 600;
    color: var(--acento-2);
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body data-variant="v1_hook">
  <div class="container">
    <span class="symbol" data-logo-simbolo data-fit data-fit-min="90">*</span>
    <h1 class="title" data-titulo data-fit data-fit-min="70">Título</h1>
    <p class="copy" data-copy data-fit data-fit-min="48">Copy</p>
    <span class="footer" data-url data-fit data-fit-min="32">example.com</span>
  </div>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span>
    <span data-subtitulo></span>
    <span data-copy></span>
    <span data-logo-simbolo></span>
    <span data-logo-texto></span>
    <span data-numero></span>
    <span data-etiqueta></span>
    <span data-autor></span>
    <span data-cargo></span>
    <span data-url></span>
    <span data-acento></span>
    <span data-acento-2></span>
  </div>
</body>
</html>
