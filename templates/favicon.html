<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=512, height=512, initial-scale=1">
<title>Eikon - Favicon</title>
<!--
  NOTA DE BLOQUEO: El motor Eikon siempre renderiza a 512×512 (template size) × 3x
  (device_scale_factor para logos) = 1536×1536px físicos. Las variantes v1_32, v2_180,
  v3_512 comparten el mismo canvas físico; la diferencia es la estrategia visual:
    - v1_32: símbolo maximizado + stroke grueso (legible al downscale 32×32)
    - v2_180: símbolo estándar con fondo oscuro (Apple Touch Icon)
    - v3_512: símbolo en canvas completo con gradiente (PWA app icon)
  El resize a 32×32 y 180×180 debe hacerse en post-procesado (sharp/lanczos).
  No se fuerza hack de viewport variable porque rompería el contrato de template size.
-->
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4;
    --acento: #43b5a6; --acento-2: #8d7cc0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; }

  body[data-variant="v1_32"]  { --bg: #0b1417; }
  body[data-variant="v2_180"] { --bg: #0b1417; }
  body[data-variant="v3_512"] { --bg: #0b1417; }

  body {
    background-color: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  /* v3_512: full app icon with rounded corners */
  body[data-variant="v3_512"] { border-radius: 64px; }

  /* ── v1_32: maximized symbol for tiny sizes ── */
  body[data-variant="v1_32"] .symbol-wrap { width: 440px; height: 440px; }
  body[data-variant="v1_32"] .symbol-wrap svg * { stroke-width: 3.5; }

  /* ── v2_180: standard with background ── */
  body[data-variant="v2_180"] .symbol-wrap { width: 380px; height: 380px; }
  body[data-variant="v2_180"] { border-radius: 36px; }
  body[data-variant="v2_180"] .symbol-wrap svg * { stroke-width: 3; }

  /* ── v3_512: balanced canvas ── */
  body[data-variant="v3_512"] .symbol-wrap { width: 400px; height: 400px; }
  body[data-variant="v3_512"] .symbol-wrap svg * { stroke-width: 2.8; }

  .symbol-wrap svg { width: 100%; height: 100%; }
  .symbol-wrap svg * { stroke: url(#favGrad); }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="symbol-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#43b5a6"/><stop offset="100%" stop-color="#8d7cc0"/>
        </linearGradient>
      </defs>
      <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke-width="1.5" opacity="0.5"/>
      <line x1="7" y1="25" x2="93" y2="75" stroke-width="1.5" opacity="0.5"/>
      <line x1="93" y1="25" x2="7" y2="75" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="50" r="4"/>
      <circle cx="50" cy="5" r="3"/><circle cx="93" cy="25" r="3"/>
      <circle cx="93" cy="75" r="3"/><circle cx="50" cy="95" r="3"/>
      <circle cx="7" cy="75" r="3"/><circle cx="7" cy="25" r="3"/>
    </svg>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-logo-simbolo></span>
  </div>
</body>
</html>
