<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #0b1417; --acento: #43b5a6; --acento-2: #e0a85e; --acento-3: #c0522a;
    --texto: #e8e0d4; --texto-muted: #8fa3a8; --surface: #152028;
    --grad-hero: linear-gradient(135deg, #e0a85e 0%, #c0522a 40%, #43b5a6 100%);
    --grad-bg: radial-gradient(ellipse at 20% 50%, #152028 0%, #0b1417 55%);
    --font-titulo: 'Playfair Display', Georgia, serif;
    --font-cuerpo: 'Inter', system-ui, sans-serif;
  }
  body {
    /* 728x90 @2x = 1456x180 */
    width: 1456px; height: 180px;
    font-family: var(--font-cuerpo);
    background: var(--bg); color: var(--texto);
    overflow: hidden; position: relative;
  }
  .bg { position: absolute; inset: 0; background: var(--grad-bg); }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
  .orb-1 { width: 300px; height: 300px; top: -100px; right: 200px; background: var(--acento); opacity: 0.16; }
  .orb-2 { width: 250px; height: 250px; bottom: -100px; left: 200px; background: var(--acento-2); opacity: 0.13; }

  .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--grad-hero); }
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: rgba(67,181,166,0.2); }

  .layout {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; align-items: center;
    padding: 0 48px;
    gap: 32px;
  }

  .simbolo {
    font-family: var(--font-titulo); font-size: 88px; font-weight: 900; line-height: 1;
    background: var(--grad-text, var(--grad-hero));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    flex-shrink: 0;
  }

  .divider { width: 1px; height: 60px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

  .titulo {
    font-family: var(--font-titulo); font-size: 38px; font-weight: 900; line-height: 1;
    background: var(--grad-text, var(--grad-hero));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    flex: 0 1 260px; max-width: 260px;
  }

  .copy {
    font-size: 20px; font-weight: 400; color: var(--texto); opacity: 0.9;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .cta {
    padding: 14px 32px; border-radius: 100px;
    border: 1px solid var(--acento);
    color: var(--acento);
    font-size: 15px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
    flex-shrink: 0;
    max-width: 270px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="top-bar"></div>
<div class="bottom-bar"></div>
<div class="layout">
  <span class="simbolo" data-logo-simbolo data-fit data-fit-min="46"></span>
  <div class="divider"></div>
  <span class="titulo" data-titulo data-fit data-fit-min="24"></span>
  <span class="copy" data-copy data-fit data-fit-min="14"></span>
  <div class="cta" data-url data-fit data-fit-min="10"></div>
</div>
</body>
</html>
