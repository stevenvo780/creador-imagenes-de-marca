<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=400, initial-scale=1">
<title>Eikon - Lockup Horizontal</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4; --primario: #0b1417;
    --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif; --font-cuerpo: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 400px; overflow: hidden; }
  body {
    background-color: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex; align-items: center; justify-content: center;
    padding: 24px 32px;
  }
  /* COLOR variant (default palette) */
  body[data-variant="v1_color"] { --bg: #0b1417; --texto: #e8e0d4; }
  /* MONO: black on cream */
  body[data-variant="v2_mono"]  { --bg: #f4f1ea; --texto: #0b1417; }
  /* INVERSE: cream on black */
  body[data-variant="v3_inverse"] { --bg: #f4f1ea; --texto: #0b1417; }

  .container {
    display: flex; align-items: center; justify-content: center; gap: 28px;
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .symbol-wrap {
    flex-shrink: 0; width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
  }
  .symbol-wrap svg {
    width: 120px; height: 120px;
  }
  /* Color variant: gradient on symbol */
  body[data-variant="v1_color"] .symbol-wrap svg * { stroke: url(#hexGrad); }
  body[data-variant="v2_mono"] .symbol-wrap svg *  { stroke: #0b1417; fill: #0b1417; }
  body[data-variant="v3_inverse"] .symbol-wrap svg * { stroke: #0b1417; fill: #0b1417; }

  .wordmark {
    font-family: var(--font-titulo); font-size: 72px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.15;
    color: var(--texto);
    white-space: nowrap;
  }
  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="container">
    <div class="symbol-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#43b5a6"/>
            <stop offset="100%" stop-color="#8d7cc0"/>
          </linearGradient>
        </defs>
        <!-- Hexagon outer -->
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25"
                 fill="none" stroke-width="2.5"/>
        <!-- Internal structure lines -->
        <line x1="50" y1="5" x2="50" y2="95" stroke-width="1" opacity="0.5"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke-width="1" opacity="0.5"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke-width="1" opacity="0.5"/>
        <!-- Nodes -->
        <circle cx="50" cy="50" r="3"/>
        <circle cx="50" cy="5" r="2.5"/>
        <circle cx="93" cy="25" r="2.5"/>
        <circle cx="93" cy="75" r="2.5"/>
        <circle cx="50" cy="95" r="2.5"/>
        <circle cx="7" cy="75" r="2.5"/>
        <circle cx="7" cy="25" r="2.5"/>
      </svg>
    </div>
    <h1 class="wordmark" data-logo-texto data-fit data-fit-min="22">Kósmos</h1>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span><span data-subtitulo></span><span data-copy></span>
    <span data-logo-simbolo></span><span data-logo-texto></span>
    <span data-numero></span><span data-etiqueta></span><span data-url></span>
  </div>
</body>
</html>
