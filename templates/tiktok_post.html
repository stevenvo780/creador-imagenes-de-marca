<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1">
<title>Eikon - TikTok Cover</title>
<link rel="stylesheet" href="./eikon-system.css">
<style>
  :root { --asset-width: 1080px; --asset-height: 1920px; }
</style>
</head>
<body data-template="tiktok_cover" data-variant="v1_hook" data-brand-line="cloud">

  <main class="asset">
    <section class="brand-row">
      <span class="brand-mark" data-logo-simbolo data-fit data-fit-min="18">*</span>
      <span class="brand-name" data-logo-texto data-fit data-fit-min="10">Marca</span>
    </section>
    <section class="content">
      <span class="logo-symbol" data-logo-simbolo data-fit data-fit-min="70">*</span>
      <h1 class="title" data-titulo data-fit data-fit-min="44" data-fit-y="true">Titulo</h1>
      <h2 class="subtitle" data-subtitulo data-fit data-fit-min="18">Subtitulo</h2>
      <p class="copy" data-copy data-fit data-fit-min="18" data-fit-y="true">Copy</p>
    </section>
    <span class="url" data-url data-fit data-fit-min="14">example.com</span>
  </main>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span>
    <span data-subtitulo></span>
    <span data-copy></span>
    <span data-logo-simbolo></span>
    <span data-logo-texto></span>
    <span data-numero></span>
    <span data-etiqueta></span>
    <span data-autor></span>
    <span data-cargo></span>
    <span data-url></span>
    <span data-acento></span>
    <span data-acento-2></span>
  </div>
<script src="./eikon-runtime.js"></script>
</body>
</html>
