<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584, height=396, initial-scale=1">
<title>Eikon - LinkedIn Banner</title>
<style>
/* ═══════ FONTS ═══════ */
@font-face { font-family: "Inter"; font-style: normal; font-weight: 400; font-display: block; src: url("fonts/Inter-400.woff2") format("woff2"); }
@font-face { font-family: "Inter"; font-style: normal; font-weight: 700; font-display: block; src: url("fonts/Inter-700.woff2") format("woff2"); }
@font-face { font-family: "Playfair Display"; font-style: normal; font-weight: 400; font-display: block; src: url("fonts/PlayfairDisplay-400.woff2") format("woff2"); }
@font-face { font-family: "Playfair Display"; font-style: normal; font-weight: 700; font-display: block; src: url("fonts/PlayfairDisplay-700.woff2") format("woff2"); }
@font-face { font-family: "Playfair Display"; font-style: normal; font-weight: 900; font-display: block; src: url("fonts/PlayfairDisplay-900.woff2") format("woff2"); }

/* ═══════ DESIGN TOKENS ═══════ */
:root {
  --bg: #0b1417; --texto: #e8e0d4; --primario: #0b1417;
  --acento: #43b5a6; --acento-2: #8d7cc0; --texto-muted: #a09080;
  --font-titulo: 'Playfair Display', Georgia, serif;
  --font-cuerpo: 'Inter', system-ui, sans-serif;
  --space-0: 0; --space-1: 8px; --space-2: 16px; --space-3: 24px;
  --space-4: 32px; --space-5: 40px; --space-6: 48px;
  --space-8: 64px; --space-10: 80px; --space-12: 96px;
  --type-xs: 8px; --type-sm: 10px; --type-base: 16px;
  --type-lg: 20px; --type-xl: 25px; --type-2xl: 31px;
  --type-3xl: 39px; --type-4xl: 49px; --type-5xl: 61px; --type-6xl: 76px;
  --tracking-tight: -0.02em; --tracking-normal: 0em; --tracking-wide: 0.02em;
  --leading-tight: 1.2; --leading-normal: 1.5; --leading-relaxed: 1.8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1584px; height: 396px; overflow: hidden; }

/* ═══════ DEPTH SYSTEM ═══════ */
.depth-radial {
  background: radial-gradient(ellipse at 20% 50%,
    color-mix(in srgb, var(--bg) 92%, white) 0%,
    var(--bg) 65%,
    var(--bg) 100%);
}

body {
  font-family: var(--font-cuerpo); color: var(--texto); position: relative;
}

/* ═══════ LAYOUT ═══════ */
.asset {
  display: flex; flex-direction: row; align-items: center; height: 100%;
  padding: var(--space-5) var(--space-8);
  position: relative; z-index: 1;
}
.depth-aurora::before {
  content: ''; position: absolute; width: 600px; height: 600px; border-radius: 40%;
  background: radial-gradient(ellipse, color-mix(in srgb, var(--acento) 8%, transparent) 0%, transparent 70%);
  filter: blur(120px); top: -280px; left: -80px; pointer-events: none; z-index: 0;
}
.depth-aurora::after {
  content: ''; position: absolute; width: 500px; height: 500px; border-radius: 35%;
  background: radial-gradient(ellipse, color-mix(in srgb, var(--acento-2) 8%, transparent) 0%, transparent 75%);
  filter: blur(100px); bottom: -280px; right: -60px; pointer-events: none; z-index: 0;
}

/* ═══════ LOGO BLOCK ═══════ */
.logo-block {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--space-2); flex-shrink: 0; width: 360px; position: relative; z-index: 1;
  border-right: 1px solid color-mix(in srgb, var(--texto-muted) 12%, transparent);
  padding-right: var(--space-6);
}
.logo-hero {
  display: flex; align-items: center; justify-content: center;
  width: 80px; height: 80px;
  position: relative; z-index: 1;
}
.logo-hero img,
.logo-hero [data-isotype-container],
.logo-hero svg { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; }
.logo-brand {
  font-family: var(--font-cuerpo); font-size: var(--type-lg); font-weight: 700;
  letter-spacing: var(--tracking-tight); text-align: center;
}
.logo-tag {
  font-family: var(--font-cuerpo); font-size: var(--type-sm); font-weight: 600;
  letter-spacing: var(--tracking-wide); color: var(--texto-muted);
  text-transform: uppercase; text-align: center;
}

/* ═══════ CONTENT BLOCK ═══════ */
.content-block {
  display: flex; flex-direction: column; gap: var(--space-2);
  flex: 1; padding-left: var(--space-6); position: relative; z-index: 1;
}
.accent-line {
  width: var(--space-6); height: 2px;
  background: linear-gradient(90deg, var(--acento), var(--acento-2));
  border-radius: 1px;
}
.headline {
  font-family: var(--font-titulo); font-size: 44px; font-weight: 700;
  line-height: var(--leading-tight); letter-spacing: var(--tracking-tight);
  max-width: 760px;
}
.copy {
  font-family: var(--font-cuerpo); font-size: var(--type-base); font-weight: 400;
  line-height: var(--leading-normal); color: color-mix(in srgb, var(--texto) 82%, var(--bg));
  max-width: 640px;
}
.url-cta {
  font-family: var(--font-cuerpo); font-size: 13px; font-weight: 600;
  color: var(--acento); letter-spacing: var(--tracking-wide);
}

/* ═══════ ACCENT BOTTOM BAR ═══════ */
.accent-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--acento), var(--acento-2));
  opacity: 0.8; z-index: 2;
}

/* ═══════ VARIANTS ═══════ */
body[data-variant="v1_institucional"] .headline { font-size: 44px; }
body[data-variant="v2_producto"] { background: radial-gradient(ellipse at 80% 50%, color-mix(in srgb, var(--bg) 90%, white) 0%, var(--bg) 65%, var(--bg) 100%); }
body[data-variant="v2_producto"] .logo-block { border-right-color: color-mix(in srgb, var(--acento) 20%, transparent); }
body[data-variant="v2_producto"] .accent-bar { opacity: 1; height: 5px; }
body[data-variant="v3_evento"] .headline { font-size: 48px; font-weight: 900; }
body[data-variant="v3_evento"] .accent-line { width: var(--space-8); height: 3px; }

.contract-fields { display: none !important; }
</style>
</head>
<body class="depth-radial" data-template="linkedin_banner" data-variant="v1_institucional" data-brand-line="cloud">

  <main class="asset depth-aurora">
    <div class="logo-block">
      <span class="logo-hero" data-isotype-container></span>
      <span class="logo-brand" data-logo-texto data-fit data-fit-min="14">Marca</span>
      <span class="logo-tag" data-subtitulo data-fit data-fit-min="8">Tagline</span>
    </div>

    <div class="content-block">
      <div class="accent-line"></div>
      <h1 class="headline" data-titulo data-fit data-fit-min="28" data-fit-y="true">Headline con propuesta de valor</h1>
      <p class="copy" data-copy data-fit data-fit-min="12" data-fit-y="true">Copy breve de credibilidad</p>
      <span class="url-cta" data-url data-fit data-fit-min="9">example.com</span>
    </div>
  </main>
  <div class="accent-bar"></div>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span><span data-subtitulo></span><span data-copy></span>
    <span data-logo-simbolo></span><span data-logo-texto></span>
    <span data-isotype-container></span><span data-url></span>
  </div>
<script src="./eikon-runtime.js"></script>
</body>
</html>
