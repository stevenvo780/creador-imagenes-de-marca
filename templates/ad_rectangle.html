<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300, height=250, initial-scale=1">
<title>Eikon - Ad Rectangle</title>
<style>
  :root {
    --bg: #0b1417;
    --texto: #e8e0d4;
    --acento: #43b5a6;
    --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif;
    --font-cuerpo: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 300px;
    height: 250px;
    overflow: hidden;
  }

  body {
    background-color: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 18px 22px 16px;
    text-align: center;
    position: relative;
  }

  body[data-variant="v1_visual"]     { --bg: #0b1417; --texto: #e8e0d4; }
  body[data-variant="v2_data"]        { --bg: #0b1417; --texto: #e8e0d4; }
  body[data-variant="v3_testimonial"] { --bg: #131e22; --texto: #e8e0d4; }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 0;
  }

  .symbol-wrap {
    position: relative;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .symbol-wrap::before {
    content: "";
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--acento), var(--acento-2));
    opacity: 0.3;
    pointer-events: none;
  }
  .symbol-wrap svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }
  .symbol-wrap svg * {
    stroke: url(#rectGrad);
  }

  .brand {
    font-family: var(--font-cuerpo);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--acento);
    line-height: 1;
  }

  .signature-rule {
    width: 56px;
    height: 2px;
    border: 0;
    background: linear-gradient(90deg, var(--acento), var(--acento-2));
    opacity: 0.8;
    display: none;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 14px;
  }

  .title {
    font-family: var(--font-titulo);
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--texto);
    letter-spacing: -0.01em;
  }

  .copy {
    font-size: 11px;
    line-height: 1.4;
    opacity: 0.78;
    color: var(--texto);
  }

  .url {
    font-size: 9px;
    opacity: 0.6;
    color: var(--texto);
    letter-spacing: 0.04em;
  }

  .cta {
    font-size: 10px;
    font-weight: 700;
    color: var(--bg);
    background: linear-gradient(90deg, var(--acento), var(--acento-2));
    padding: 6px 16px;
    border-radius: 3px;
    text-decoration: none;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .big-number {
    display: none;
    font-family: var(--font-titulo);
    font-size: 64px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--acento), var(--acento-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  body[data-variant="v1_visual"] .symbol-wrap {
    width: 84px;
    height: 84px;
  }
  body[data-variant="v1_visual"] .symbol-wrap::before {
    inset: -16px;
    background: radial-gradient(circle at center, rgba(67,181,166,0.34) 0%, rgba(141,124,192,0.12) 45%, transparent 72%);
  }
  body[data-variant="v1_visual"] .signature-rule { display: block; }
  body[data-variant="v1_visual"] .big-number { display: none; }
  body[data-variant="v1_visual"] .copy { display: none; }
  body[data-variant="v1_visual"] .cta { display: none; }

  body[data-variant="v2_data"] .big-number { display: block; }
  body[data-variant="v2_data"] .symbol-wrap { display: none; }
  body[data-variant="v2_data"] .signature-rule { display: none; }
  body[data-variant="v2_data"] .title { font-size: 13px; }
  body[data-variant="v2_data"] .url { display: none; }

  body[data-variant="v3_testimonial"] .title {
    font-style: italic;
    font-size: 15px;
  }
  body[data-variant="v3_testimonial"] .symbol-wrap { display: none; }
  body[data-variant="v3_testimonial"] .signature-rule { display: none; }
  body[data-variant="v3_testimonial"] .big-number { display: none; }
  body[data-variant="v3_testimonial"] .cta {
    background: #e0a85e;
    color: #0b1417;
  }
  body[data-variant="v3_testimonial"] .url { display: none; }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="stage">
    <div class="symbol-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="rectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#43b5a6"/>
            <stop offset="100%" stop-color="#8d7cc0"/>
          </linearGradient>
        </defs>
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke-width="1" opacity="0.5"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke-width="1" opacity="0.5"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke-width="1" opacity="0.5"/>
        <circle cx="50" cy="50" r="3"/>
        <circle cx="50" cy="5" r="2.5"/>
        <circle cx="93" cy="25" r="2.5"/>
        <circle cx="93" cy="75" r="2.5"/>
        <circle cx="50" cy="95" r="2.5"/>
        <circle cx="7" cy="75" r="2.5"/>
        <circle cx="7" cy="25" r="2.5"/>
      </svg>
    </div>
    <div class="brand" data-logo-texto data-fit data-fit-min="5">Kósmos</div>
    <div class="signature-rule" aria-hidden="true"></div>
  </div>

  <div class="content">
    <div class="big-number" data-numero data-fit data-fit-min="28">22</div>
    <h1 class="title" data-titulo data-fit data-fit-min="8">Simulación científica open source</h1>
    <p class="copy" data-copy data-fit data-fit-min="6">22 simulaciones de emergencia y sistemas complejos. Explora el catálogo.</p>
    <span class="url" data-url data-fit data-fit-min="6">kosmos.stevenvallejo.com</span>
    <span class="cta">Explorar catálogo →</span>
    <div class="contract-fields" aria-hidden="true">
      <span data-titulo></span>
      <span data-copy></span>
      <span data-numero></span>
      <span data-logo-texto></span>
      <span data-url></span>
    </div>
  </div>
</body>
</html>
