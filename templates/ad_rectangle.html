<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300, height=250, initial-scale=1">
<title>Eikon - Ad Rectangle 300×250</title>
<style>
  :root {
    --bg: #0b1417;
    --texto: #e8e0d4;
    --acento: #43b5a6;
    --acento-2: #8d7cc0;
    --font-titulo: 'Playfair Display', Georgia, serif;
    --font-cuerpo: 'Inter', system-ui, -apple-system, sans-serif;
    --type-xs: 8px;
    --type-sm: 10px;
    --type-base: 16px;
    --type-lg: 20px;
    --type-xl: 25px;
    --type-2xl: 31px;
    --type-3xl: 39px;
    --space-0: 0;
    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --tracking-tight: -0.02em;
    --tracking-normal: 0em;
    --leading-tight: 1.2;
    --leading-normal: 1.5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 300px;
    height: 250px;
    overflow: hidden;
  }

  body {
    background-color: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex;
    gap: var(--space-0);
    padding: var(--space-0);
    position: relative;
  }

  .symbol-container {
    width: 110px;
    background-color: var(--acento);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  [data-isotype-container] {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  [data-isotype-container] svg {
    width: 100%;
    height: 100%;
  }

  [data-isotype-container] svg * {
    stroke: var(--bg);
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: var(--space-2) var(--space-2);
  }

  .header {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
  }

  .brand {
    font-family: var(--font-cuerpo);
    font-size: var(--type-xs);
    font-weight: 700;
    letter-spacing: var(--tracking-normal);
    text-transform: uppercase;
    color: var(--acento);
    line-height: var(--leading-tight);
  }

  .title {
    font-family: var(--font-titulo);
    font-size: var(--type-xl);
    font-weight: 700;
    line-height: var(--leading-tight);
    color: var(--texto);
    letter-spacing: var(--tracking-tight);
  }

  .copy {
    font-size: var(--type-sm);
    line-height: var(--leading-normal);
    color: var(--texto);
    opacity: 0.85;
  }

  .meta {
    font-size: var(--type-xs);
    letter-spacing: var(--tracking-normal);
    color: var(--texto);
    opacity: 0.65;
  }

  .cta {
    font-family: var(--font-cuerpo);
    font-size: var(--type-sm);
    font-weight: 700;
    color: var(--bg);
    background-color: var(--acento);
    padding: var(--space-1) var(--space-2);
    border: none;
    text-decoration: none;
    letter-spacing: var(--tracking-normal);
    text-transform: uppercase;
    cursor: pointer;
    align-self: flex-start;
  }

  body[data-variant="v1_visual"] .copy { display: none; }
  body[data-variant="v1_visual"] .meta { display: none; }
  body[data-variant="v1_visual"] .cta { display: none; }

  body[data-variant="v2_data"] .copy { display: block; }
  body[data-variant="v2_data"] .meta { display: block; }
  body[data-variant="v2_data"] .cta { display: block; }

  body[data-variant="v3_testimonial"] .symbol-container { background-color: var(--acento-2); }
  body[data-variant="v3_testimonial"] .title { font-style: italic; font-size: var(--type-lg); }
  body[data-variant="v3_testimonial"] .copy { display: none; }
  body[data-variant="v3_testimonial"] .meta { display: block; }
  body[data-variant="v3_testimonial"] .cta { display: none; }

  .contract-fields { display: none !important; }
</style>
</head>
<body>
  <div class="symbol-container">
    <div data-isotype-container>
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke-width="2.5"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke-width="1" opacity="0.6"/>
        <line x1="7" y1="25" x2="93" y2="75" stroke-width="1" opacity="0.6"/>
        <line x1="93" y1="25" x2="7" y2="75" stroke-width="1" opacity="0.6"/>
        <circle cx="50" cy="50" r="3" fill="currentColor"/>
      </svg>
    </div>
  </div>

  <div class="content-area">
    <div class="header">
      <div class="brand" data-logo-texto data-fit data-fit-min="5">Kósmos</div>
      <h1 class="title" data-titulo data-fit data-fit-min="14">Simulación científica</h1>
      <p class="copy" data-copy data-fit data-fit-min="7">22 sistemas complejos emergentes en catálogo open source.</p>
    </div>

    <div>
      <span class="meta" data-url data-fit data-fit-min="6">kosmos.stevenvallejo.com</span>
      <button class="cta">Explorar →</button>
    </div>

    <div class="contract-fields" aria-hidden="true">
      <span data-titulo></span>
      <span data-copy></span>
      <span data-logo-texto></span>
      <span data-url></span>
    </div>
  </div>
</body>
</html>
