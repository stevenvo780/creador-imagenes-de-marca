<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1">
<title>Eikon - Instagram Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primario: #0b1417;
    --acento-2: #8d7cc0;
    --texto: #e8e0d4;
    --bg: #0b1417;
    --gradient-hero: linear-gradient(135deg, #43b5a6, #8d7cc0);
    --font-titulo: 'Playfair Display', Georgia, serif;
    --font-cuerpo: 'Inter', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    background-color: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 120px 80px 160px 80px;
  }

  /* VARIANTES */
  body[data-variant="v1_cover"] { /* Cover con acento lateral */ }
  body[data-variant="v2_story"] { /* Story narrativo */ }
  body[data-variant="v3_promo"] { /* Promoción */ }
  body[data-variant="v4_qna"] { /* Q&A */ }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: auto;
  }

  .brand-mark {
    font-size: 48px;
    font-weight: 700;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 600;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    text-align: center;
    flex: 1;
  }

  .logo-symbol {
    font-size: 140px;
    font-weight: 700;
    line-height: 1;
  }

  .title {
    font-family: var(--font-titulo);
    font-size: 120px;
    font-weight: 700;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 56px;
    font-weight: 600;
    line-height: 1.2;
  }

  .copy {
    font-size: 72px;
    line-height: 1.4;
  }

  .url {
    font-size: 48px;
    font-weight: 600;
    margin-top: auto;
    color: var(--acento-2);
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body data-variant="v1_cover" data-brand-line="cloud">

  <section class="brand-row">
    <span class="brand-mark" data-logo-simbolo data-fit data-fit-min="28">*</span>
    <span class="brand-name" data-logo-texto data-fit data-fit-min="16">Marca</span>
  </section>

  <section class="content">
    <span class="logo-symbol" data-logo-simbolo data-fit data-fit-min="80">*</span>
    <h1 class="title" data-titulo data-fit data-fit-min="60" data-fit-y="true">Titulo</h1>
    <h2 class="subtitle" data-subtitulo data-fit data-fit-min="32">Subtitulo</h2>
    <p class="copy" data-copy data-fit data-fit-min="40" data-fit-y="true">Copy</p>
  </section>

  <span class="url" data-url data-fit data-fit-min="24">example.com</span>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span>
    <span data-subtitulo></span>
    <span data-copy></span>
    <span data-logo-simbolo></span>
    <span data-logo-texto></span>
    <span data-numero></span>
    <span data-etiqueta></span>
    <span data-autor></span>
    <span data-cargo></span>
    <span data-url></span>
    <span data-acento></span>
    <span data-acento-2></span>
  </div>

<script src="./eikon-runtime.js"></script>
</body>
</html>
