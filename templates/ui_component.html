<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg: #0b1417;
      --primario: #0b1417;
      --acento: #43b5a6;
      --acento-2: #e0a85e;
      --acento-3: #c0522a;
      --texto: #e8e0d4;
      --texto-muted: #8fa3a8;
      --surface: #152028;
      --grad-hero: linear-gradient(135deg, #43b5a6 0%, #e0a85e 55%, #c0522a 100%);
      --grad-bg: radial-gradient(ellipse at 18% 48%, #152028 0%, #0b1417 58%);
      --font-titulo: Inter, system-ui, sans-serif;
      --font-cuerpo: Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: var(--texto);
      background:
        radial-gradient(circle at 12% 18%, color-mix(in srgb, var(--acento) 24%, transparent), transparent 28%),
        radial-gradient(circle at 88% 74%, color-mix(in srgb, var(--acento-2) 20%, transparent), transparent 31%),
        var(--grad-bg),
        var(--bg);
      font-family: var(--font-cuerpo);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image: linear-gradient(rgba(255,255,255,0.34) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.34) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 74%);
    }

    .ui-frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(28px, 5vw, 76px);
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
      gap: clamp(24px, 4vw, 72px);
      align-items: center;
      isolation: isolate;
    }

    .ui-frame::after {
      content: "";
      position: absolute;
      inset: clamp(14px, 2vw, 30px);
      border: 1px solid color-mix(in srgb, var(--texto) 16%, transparent);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 1.5vw, 22px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--texto-muted);
      font-size: clamp(14px, 1.5vw, 18px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .symbol {
      width: 42px;
      height: 42px;
      border: 1px solid color-mix(in srgb, var(--acento) 44%, transparent);
      display: grid;
      place-items: center;
      color: var(--acento);
      font-family: var(--font-titulo);
      font-size: 26px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--surface) 74%, transparent);
    }

    .kicker {
      color: var(--acento);
      font-size: clamp(13px, 1.35vw, 17px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      max-width: 13ch;
      color: var(--texto);
      font-family: var(--font-titulo);
      font-size: clamp(42px, 7vw, 108px);
      font-weight: 800;
      line-height: 0.92;
      text-wrap: balance;
    }

    .subtitle {
      max-width: 48ch;
      color: var(--acento-2);
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.24;
      font-weight: 700;
    }

    .copy {
      max-width: 62ch;
      color: var(--texto-muted);
      font-size: clamp(17px, 1.55vw, 24px);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid color-mix(in srgb, var(--acento) 54%, transparent);
      background: color-mix(in srgb, var(--acento) 14%, transparent);
      color: var(--texto);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .meta {
      color: var(--texto-muted);
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .visual {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 220px;
      align-self: stretch;
      display: grid;
      place-items: center;
    }

    .mock {
      display: none;
      width: min(100%, 680px);
      min-height: min(70vh, 520px);
      border: 1px solid color-mix(in srgb, var(--texto) 18%, transparent);
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      box-shadow: 0 34px 90px rgba(0,0,0,0.28);
      padding: clamp(18px, 3vw, 42px);
      overflow: hidden;
    }

    body[data-category="banners"] .mock-banner,
    body[data-category="sliders"] .mock-slider,
    body[data-category="heroes"] .mock-hero,
    body[data-category="cards"] .mock-cards,
    body[data-category="features"] .mock-features,
    body[data-category="stats"] .mock-stats,
    body[data-category="ctas"] .mock-cta,
    body[data-category="testimonials"] .mock-testimonial,
    body[data-category="pricing"] .mock-pricing,
    body[data-category="navbars"] .mock-navbar,
    body[data-category="footers"] .mock-footer,
    body[data-category="forms"] .mock-form {
      display: grid;
    }

    body[data-category="banners"] .ui-frame {
      padding: 30px 56px;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.62fr);
      gap: 34px;
    }

    body[data-category="banners"] .content {
      gap: 8px;
    }

    body[data-category="banners"] .brand {
      font-size: 14px;
    }

    body[data-category="banners"] .symbol {
      width: 34px;
      height: 34px;
      font-size: 20px;
    }

    body[data-category="banners"] .title {
      max-width: 18ch;
      font-size: clamp(34px, 4.6vw, 66px);
      line-height: 0.96;
    }

    body[data-category="banners"] .subtitle {
      max-width: 62ch;
      font-size: 17px;
      line-height: 1.22;
    }

    body[data-category="banners"] .copy {
      max-width: 72ch;
      font-size: 14px;
      line-height: 1.32;
    }

    body[data-category="banners"] .actions {
      margin-top: 2px;
    }

    body[data-category="banners"] .button {
      min-height: 38px;
      padding-inline: 16px;
      font-size: 13px;
    }

    body[data-category="banners"] .mock {
      min-height: 210px;
      padding: 26px;
    }

    body[data-category="navbars"] .ui-frame {
      padding: 26px 52px;
      grid-template-columns: minmax(260px, 0.52fr) minmax(560px, 1.48fr);
      gap: 28px;
    }

    body[data-category="navbars"] .content {
      gap: 7px;
    }

    body[data-category="navbars"] .brand {
      font-size: 13px;
    }

    body[data-category="navbars"] .symbol {
      width: 34px;
      height: 34px;
      font-size: 20px;
    }

    body[data-category="navbars"] .title {
      font-size: clamp(30px, 3.6vw, 48px);
      line-height: 0.96;
      max-width: 12ch;
    }

    body[data-category="navbars"] .subtitle,
    body[data-category="navbars"] .copy,
    body[data-category="navbars"] .actions {
      display: none;
    }

    body[data-category="navbars"] .mock {
      min-height: 130px;
      padding: 22px;
    }

    body[data-output-category="ads"] .ui-frame {
      padding: 18px 46px;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.56fr);
      gap: 24px;
    }

    body[data-output-category="ads"] .content {
      gap: 5px;
    }

    body[data-output-category="ads"] .brand {
      font-size: 12px;
    }

    body[data-output-category="ads"] .symbol {
      width: 28px;
      height: 28px;
      font-size: 17px;
    }

    body[data-output-category="ads"] .kicker {
      font-size: 12px;
      letter-spacing: 0.14em;
    }

    body[data-output-category="ads"] .title {
      max-width: 18ch;
      font-size: clamp(24px, 3.2vw, 44px);
      line-height: 0.95;
    }

    body[data-output-category="ads"] .subtitle {
      display: none;
    }

    body[data-output-category="ads"] .copy {
      display: none;
    }

    body[data-output-category="ads"] .actions {
      display: none;
    }

    body[data-output-category="ads"] .button {
      min-height: 30px;
      padding-inline: 13px;
      font-size: 12px;
    }

    body[data-output-category="ads"] .mock {
      min-height: 104px;
      padding: 18px;
      gap: 10px;
    }

    body[data-output-category="logos"] .title {
      max-width: 14ch;
      font-size: clamp(36px, 5vw, 76px);
    }

    .mini-label {
      color: var(--acento);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .line {
      height: 10px;
      border-radius: 99px;
      background: color-mix(in srgb, var(--texto) 20%, transparent);
    }

    .line.short { width: 54%; }
    .line.mid { width: 72%; }
    .line.accent { background: var(--grad-hero); }

    .mock-banner {
      min-height: 230px;
      align-content: center;
      gap: 18px;
    }

    .mock-slider {
      grid-template-rows: 1fr auto;
      gap: 20px;
    }

    .slides {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
      min-height: 260px;
    }

    .slide {
      border: 1px solid color-mix(in srgb, var(--texto) 16%, transparent);
      background: color-mix(in srgb, var(--bg) 42%, transparent);
      padding: 22px;
      display: grid;
      align-content: end;
      gap: 12px;
    }

    .dots {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 44px;
      height: 6px;
      background: color-mix(in srgb, var(--texto) 18%, transparent);
    }

    .dot:first-child { background: var(--acento); }

    .mock-hero {
      min-height: 430px;
      grid-template-columns: 1fr 0.86fr;
      gap: 22px;
      align-items: stretch;
    }

    .hero-panel {
      display: grid;
      align-content: end;
      gap: 14px;
      padding: 28px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--acento) 20%, transparent), transparent 58%);
      border: 1px solid color-mix(in srgb, var(--acento) 28%, transparent);
    }

    .hero-orbit {
      border: 1px solid color-mix(in srgb, var(--texto) 16%, transparent);
      background:
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--acento-2) 42%, transparent) 0 12%, transparent 13%),
        radial-gradient(circle at 38% 34%, color-mix(in srgb, var(--acento) 26%, transparent), transparent 28%),
        color-mix(in srgb, var(--surface) 70%, transparent);
    }

    .mock-cards {
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-content: center;
    }

    .card {
      min-height: 190px;
      border: 1px solid color-mix(in srgb, var(--texto) 14%, transparent);
      background: color-mix(in srgb, var(--bg) 48%, transparent);
      padding: 18px;
      display: grid;
      align-content: end;
      gap: 12px;
    }

    .card:nth-child(2) { transform: translateY(-20px); border-color: color-mix(in srgb, var(--acento) 46%, transparent); }

    .mock-features {
      gap: 14px;
      align-content: center;
    }

    .feature {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid color-mix(in srgb, var(--texto) 14%, transparent);
      background: color-mix(in srgb, var(--bg) 34%, transparent);
    }

    .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      color: var(--acento);
      border: 1px solid color-mix(in srgb, var(--acento) 40%, transparent);
      border-radius: 50%;
      font-weight: 800;
    }

    .mock-stats {
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      align-content: center;
    }

    .stat {
      min-height: 150px;
      padding: 22px;
      display: grid;
      align-content: end;
      gap: 8px;
      background: color-mix(in srgb, var(--bg) 44%, transparent);
      border: 1px solid color-mix(in srgb, var(--texto) 14%, transparent);
    }

    .number {
      color: var(--acento);
      font-family: var(--font-titulo);
      font-size: clamp(42px, 5vw, 72px);
      font-weight: 800;
      line-height: 0.9;
    }

    .mock-cta {
      min-height: 260px;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 20px;
    }

    .cta-ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--acento);
      font-size: 54px;
      border: 1px solid color-mix(in srgb, var(--acento) 50%, transparent);
      background: radial-gradient(circle, color-mix(in srgb, var(--acento) 20%, transparent), transparent 65%);
    }

    .mock-testimonial {
      align-content: center;
      gap: 20px;
    }

    .quote {
      font-family: var(--font-titulo);
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1.04;
      color: var(--texto);
    }

    .mock-pricing {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-content: center;
    }

    .plan {
      min-height: 270px;
      padding: 20px;
      border: 1px solid color-mix(in srgb, var(--texto) 14%, transparent);
      display: grid;
      align-content: space-between;
      gap: 14px;
      background: color-mix(in srgb, var(--bg) 44%, transparent);
    }

    .plan:nth-child(2) { border-color: color-mix(in srgb, var(--acento) 52%, transparent); background: color-mix(in srgb, var(--acento) 12%, var(--bg)); }

    .price {
      font-family: var(--font-titulo);
      font-size: 42px;
      color: var(--acento-2);
      font-weight: 800;
    }

    .mock-navbar {
      min-height: 150px;
      align-content: center;
      gap: 24px;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid color-mix(in srgb, var(--texto) 16%, transparent);
      color: var(--texto-muted);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }

    .mock-footer {
      min-height: 250px;
      grid-template-columns: 1.2fr repeat(3, 0.8fr);
      gap: 22px;
      align-content: center;
    }

    .footer-col {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .mock-form {
      grid-template-columns: 1fr;
      gap: 14px;
      align-content: center;
    }

    .field {
      min-height: 58px;
      border: 1px solid color-mix(in srgb, var(--texto) 14%, transparent);
      background: color-mix(in srgb, var(--bg) 44%, transparent);
      display: flex;
      align-items: center;
      padding: 0 18px;
      color: var(--texto-muted);
      font-weight: 700;
    }

    .field.tall {
      min-height: 130px;
      align-items: flex-start;
      padding-top: 18px;
    }

    body[data-variant="02"] .ui-frame,
    body[data-variant="07"] .ui-frame {
      grid-template-columns: 1fr;
      text-align: center;
      justify-items: center;
    }

    body[data-variant="02"] .title,
    body[data-variant="07"] .title,
    body[data-variant="10"] .title { max-width: 16ch; }

    body[data-variant="02"] .content,
    body[data-variant="07"] .content { align-items: center; }

    body[data-variant="03"] .ui-frame {
      grid-template-columns: minmax(260px, 0.58fr) minmax(420px, 1.42fr);
    }

    body[data-variant="03"] .content {
      border-left: 8px solid var(--acento);
      padding-left: 28px;
    }

    body[data-variant="04"] .title,
    body[data-variant="09"] .title {
      color: transparent;
      background: var(--grad-hero);
      -webkit-background-clip: text;
      background-clip: text;
    }

    body[data-variant="05"] {
      background:
        radial-gradient(circle at 82% 20%, color-mix(in srgb, var(--acento) 20%, transparent), transparent 24%),
        #f2ecdf;
      color: #172023;
    }

    body[data-variant="05"] .ui-frame,
    body[data-variant="05"] .mock,
    body[data-variant="05"] .card,
    body[data-variant="05"] .feature,
    body[data-variant="05"] .stat,
    body[data-variant="05"] .plan,
    body[data-variant="05"] .field {
      background: rgba(255,255,255,0.68);
      color: #172023;
    }

    body[data-variant="05"] .title,
    body[data-variant="05"] .copy { color: #172023; }

    body[data-variant="06"] .ui-frame::before {
      content: "";
      position: absolute;
      inset: -20% -8% auto auto;
      width: 56%;
      height: 150%;
      background: color-mix(in srgb, var(--acento) 16%, transparent);
      transform: rotate(16deg);
      z-index: -1;
    }

    body[data-variant="08"] .ui-frame {
      grid-template-columns: 1.15fr 0.85fr;
      align-items: end;
    }

    body[data-variant="08"] .mock {
      transform: translateY(-24px);
    }

    body[data-variant="09"] .ui-frame {
      grid-template-columns: 0.82fr 1.18fr;
      background: linear-gradient(90deg, rgba(0,0,0,0.32), transparent);
    }

    body[data-variant="10"] .ui-frame {
      grid-template-columns: 1fr;
      align-content: center;
      padding-inline: clamp(48px, 10vw, 140px);
    }

    body[data-variant="10"] .visual {
      display: none;
    }

    @media (max-width: 900px) {
      .ui-frame {
        grid-template-columns: 1fr;
        align-content: center;
      }
      .visual { display: none; }
      .title { font-size: clamp(38px, 12vw, 76px); }
    }
  </style>
</head>

        <span class="symbol" data-ui-symbol>∞</span>

        <span class="button" data-ui-cta>Ver proyecto</span>
        <span class="meta" data-ui-meta>stevenvallejo.com</span>

    <section class="visual" aria-hidden="true">
      <div class="mock mock-banner">

      </div>

      <div class="mock mock-cards">
        <div class="card"><span class="mini-label" data-ui-item-1></span><span class="line accent"></span><span class="line"></span></div>

      <div class="mock mock-features">
        <div class="feature"><span class="icon">1</span><span class="line accent"></span></div>

        <div class="feature"><span class="icon">3</span><span class="line short"></span></div>
      </div>

      <div class="mock mock-stats">
        <div class="stat"><span class="number">12+</span><span class="mini-label" data-ui-item-1></span></div>
        <div class="stat"><span class="number">38</span><span class="mini-label" data-ui-item-2></span></div>
        <div class="stat"><span class="number">3</span><span class="mini-label" data-ui-item-3></span></div>
        <div class="stat"><span class="number">∞</span><span class="mini-label" data-ui-item-4></span></div>
      </div>

      <div class="mock mock-cta">
        <div class="cta-ring" data-ui-symbol>∞</div>
        <span class="line accent"></span>
        <span class="line mid"></span>
      </div>

      <div class="mock mock-testimonial">
        <div class="quote">“<span data-ui-item-1></span>”</div>
        <span class="line accent"></span>
        <span class="line short"></span>
      </div>

      <div class="mock mock-pricing">
        <div class="plan"><span class="mini-label" data-ui-item-1></span><span class="price">1</span><span class="line"></span></div>
        <div class="plan"><span class="mini-label" data-ui-item-2></span><span class="price">2</span><span class="line accent"></span></div>
