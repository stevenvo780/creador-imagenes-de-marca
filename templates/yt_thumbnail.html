<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720, initial-scale=1">
<title>Eikon - YouTube Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primario: #0b1417;
    --acento-2: #8d7cc0;
    --texto: #e8e0d4;
    --bg: #0b1417;
    --gradient-hero: linear-gradient(135deg, #43b5a6, #8d7cc0);
    --font-titulo: 'Playfair Display', Georgia, serif;
    --font-cuerpo: 'Inter', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; }
  body {
    background-color: var(--bg);
    color: var(--texto);
    font-family: var(--font-cuerpo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  /* VARIANTES */
  body[data-variant="v1_bold"] { border: 8px solid var(--acento-2); }
  body[data-variant="v2_clean"] { border-bottom: 16px solid var(--acento-2); }
  body[data-variant="v3_face"] { background: linear-gradient(135deg, var(--bg), rgba(67, 181, 166, 0.08)); }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    width: 100%;
    text-align: center;
  }

  .title {
    font-family: var(--font-titulo);
    font-size: 120px;
    font-weight: 700;
    line-height: 1.1;
  }

  .copy {
    font-size: 72px;
    line-height: 1.4;
  }

  .symbol {
    font-size: 140px;
    font-weight: 700;
  }

  .subtitle {
    font-size: 56px;
    line-height: 1.3;
  }

  .etiqueta {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--acento-2);
    color: var(--primario);
    padding: 8px 16px;
    font-size: 24px;
    font-weight: 700;
    border-radius: 6px;
  }

  .contract-fields { display: none !important; }
</style>
</head>
<body data-variant="v1_bold">
  <span class="etiqueta" data-etiqueta data-fit data-fit-min="14">TAGS</span>

  <div class="container">
    <span class="symbol" data-logo-simbolo data-fit data-fit-min="80">*</span>
    <h1 class="title" data-titulo data-fit data-fit-min="60">Título</h1>
    <p class="copy" data-copy data-fit data-fit-min="40">Copy</p>
  </div>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span>
    <span data-subtitulo></span>
    <span data-copy></span>
    <span data-logo-simbolo></span>
    <span data-logo-texto></span>
    <span data-numero></span>
    <span data-etiqueta></span>
    <span data-autor></span>
    <span data-cargo></span>
    <span data-url></span>
    <span data-acento></span>
    <span data-acento-2></span>
  </div>
</body>
</html>
