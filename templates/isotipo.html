<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=800, initial-scale=1">
<title>Eikon - Isotipo</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4;
    --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Playfair Display', Georgia, serif;
    --type-base: 16px;
    --type-lg: 20px;
    --type-2xl: 31px;
    --space-2: 16px;
    --space-6: 48px;
    --tracking-tight: -0.02em;
    --tracking-normal: 0em;
    --leading-tight: 1.2;
    --leading-normal: 1.5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 800px; height: 800px; overflow: hidden; }
  body {
    background-color: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-6);
  }

  /* Variantes de color — fondos sólidos limpios */
  body[data-variant="v1_color"] { --bg: #0b1417; --texto: #e8e0d4; }
  body[data-variant="v2_mono"]  { --bg: #f4f1ea; --texto: #0b1417; }
  body[data-variant="v3_inverse"] { --bg: #f4f1ea; --texto: #0b1417; }

  /* Logo protagonista — 520px (65% del canvas), centrado, sin envoltura decorativa */
  .symbol-wrap {
    width: 520px;
    height: 520px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .symbol-wrap svg,
  .symbol-wrap img { width: 100%; height: 100%; }

  /* Colores del símbolo por variante */
  body[data-variant="v1_color"] .symbol-wrap svg * {
    stroke: var(--acento);
    fill: none;
  }
  body[data-variant="v2_mono"] .symbol-wrap svg * {
    stroke: #0b1417;
    fill: #0b1417;
  }
  body[data-variant="v3_inverse"] .symbol-wrap svg * {
    stroke: #0b1417;
    fill: #0b1417;
  }

  .contract-fields { display: none !important; }

  /* Isotipo generado o fallback SVG */
  body[data-isotype-style="none"] .symbol-wrap .default-mark { display: block; }
  body[data-isotype-style]:not([data-isotype-style="none"]) .symbol-wrap .default-mark { display: none; }

  .symbol-wrap .isotype-mark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .symbol-wrap .isotype-mark img,
  .symbol-wrap .isotype-mark svg {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Capa de texto opcional (data-titulo, data-subtitulo) */
  .text-layer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    padding: 0 var(--space-6);
  }
  .text-layer [data-titulo] {
    font-family: var(--font-titulo);
    font-size: var(--type-2xl);
    color: var(--texto);
    font-weight: 600;
    letter-spacing: var(--tracking-tight);
    line-height: var(--leading-tight);
  }
  .text-layer [data-subtitulo] {
    font-size: var(--type-base);
    color: var(--texto);
    opacity: 0.8;
    letter-spacing: var(--tracking-normal);
    line-height: var(--leading-normal);
  }
</style>
</head>
<body>
  <div class="symbol-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="default-mark">
      <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" stroke-width="2.5"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke-width="1.5" opacity="0.5"/>
      <line x1="7" y1="25" x2="93" y2="75" stroke-width="1.5" opacity="0.5"/>
      <line x1="93" y1="25" x2="7" y2="75" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="50" r="4"/><circle cx="50" cy="5" r="3"/>
      <circle cx="93" cy="25" r="3"/><circle cx="93" cy="75" r="3"/>
      <circle cx="50" cy="95" r="3"/><circle cx="7" cy="75" r="3"/><circle cx="7" cy="25" r="3"/>
    </svg>
    <div class="isotype-mark" data-isotype-container></div>
  </div>
  <div class="text-layer" aria-hidden="true">
    <span data-titulo></span><span data-subtitulo></span>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-logo-simbolo></span><span data-logo-texto></span>
  </div>
</body>
</html>
