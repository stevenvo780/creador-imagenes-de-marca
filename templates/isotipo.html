<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=800, initial-scale=1">
<title>Eikon - Isotipo</title>
<style>
  :root {
    --bg: #0b1417; --texto: #e8e0d4;
    --acento: #43b5a6; --acento-2: #8d7cc0;
    --font-titulo: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 800px; height: 800px; overflow: hidden; }
  body {
    background-color: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  body[data-variant="v1_color"] { --bg: #0b1417; }
  body[data-variant="v2_mono"]  { --bg: #f4f1ea; }
  body[data-variant="v3_inverse"] { --bg: #0b1417; }

  .symbol-wrap { width: 500px; height: 500px; position: relative; }
  .symbol-wrap svg { width: 100%; height: 100%; }

  body[data-variant="v1_color"] .symbol-wrap svg * { stroke: url(#isoGrad); }
  body[data-variant="v2_mono"]  .symbol-wrap svg * { stroke: #0b1417; fill: #0b1417; }
  body[data-variant="v3_inverse"] .symbol-wrap svg * { stroke: #e8e0d4; fill: #e8e0d4; }

  .contract-fields { display: none !important; }

  /* Soporte para isotipo generado */
  body[data-isotype-style="none"] .symbol-wrap .default-mark { display: block; }
  body[data-isotype-style]:not([data-isotype-style="none"]) .symbol-wrap .default-mark { display: none; }

  .symbol-wrap .isotype-mark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .symbol-wrap .isotype-mark img,
  .symbol-wrap .isotype-mark svg {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>
  <div class="symbol-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="default-mark">
      <defs>
        <linearGradient id="isoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#43b5a6"/><stop offset="100%" stop-color="#8d7cc0"/>
        </linearGradient>
      </defs>
      <polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke-width="2.5"/>
      <line x1="50" y1="5" x2="50" y2="95" stroke-width="1.5" opacity="0.5"/>
      <line x1="7" y1="25" x2="93" y2="75" stroke-width="1.5" opacity="0.5"/>
      <line x1="93" y1="25" x2="7" y2="75" stroke-width="1.5" opacity="0.5"/>
      <circle cx="50" cy="50" r="4"/>
      <circle cx="50" cy="5" r="3"/><circle cx="93" cy="25" r="3"/>
      <circle cx="93" cy="75" r="3"/><circle cx="50" cy="95" r="3"/>
      <circle cx="7" cy="75" r="3"/><circle cx="7" cy="25" r="3"/>
    </svg>
    <div class="isotype-mark" data-isotype-container></div>
  </div>
  <div class="contract-fields" aria-hidden="true">
    <span data-logo-simbolo></span><span data-logo-texto></span>
  </div>
</body>
</html>
