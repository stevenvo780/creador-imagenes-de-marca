<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0b1417;
    --primario: #0b1417;
    --acento: #43b5a6;
    --acento-2: #8d7cc0;
    --acento-3: #A3E4D7;
    --texto: #e8e0d4;
    --texto-muted: #a09080;
    --surface: #152028;
    --font-titulo: "Playfair Display", Georgia, "Times New Roman", serif;
    --font-cuerpo: "Inter", "DejaVu Sans", Arial, system-ui, sans-serif;
    --type-4xl: 49px;
    --type-3xl: 39px;
    --type-lg: 20px;
    --type-base: 16px;
    --type-sm: 10px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-6: 48px;
    --space-8: 64px;
    --tracking-tight: -0.02em;
    --tracking-normal: 0em;
    --leading-tight: 1.2;
    --leading-normal: 1.5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    position: relative;
    overflow: hidden;
    color: var(--texto);
    background: var(--bg);
    font-family: var(--font-cuerpo);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .stage {
    position: absolute;
    left: 0;
    top: 0;
    width: 48%;
    height: 100%;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
  }

  [data-isotype-container] {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  [data-isotype-container] img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  .brand {
    position: absolute;
    left: 48%;
    top: var(--space-4);
    right: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-4);
  }

  .eyebrow {
    font-size: var(--type-sm);
    font-weight: 600;
    letter-spacing: var(--tracking-wide, 0.02em);
    color: var(--acento);
    text-transform: uppercase;
  }

  .wordmark {
    font-family: var(--font-titulo);
    font-size: var(--type-4xl);
    font-weight: 700;
    line-height: var(--leading-tight);
    letter-spacing: var(--tracking-tight);
    color: var(--texto);
    max-width: 600px;
  }

  .tagline {
    font-size: var(--type-lg);
    font-weight: 400;
    line-height: var(--leading-normal);
    color: var(--texto-muted);
    max-width: 500px;
  }

  .content {
    position: absolute;
    left: 48%;
    bottom: var(--space-4);
    right: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .titulo {
    font-family: var(--font-titulo);
    font-size: var(--type-3xl);
    font-weight: 700;
    line-height: var(--leading-tight);
    letter-spacing: var(--tracking-tight);
    color: var(--texto);
  }

  .copy {
    font-size: var(--type-base);
    font-weight: 400;
    line-height: var(--leading-normal);
    color: var(--texto-muted);
    max-width: 520px;
  }

  .accent-rule {
    position: absolute;
    left: 48%;
    top: calc(var(--space-4) + var(--space-6) + var(--space-3));
    width: var(--space-2);
    height: 1px;
    background: var(--acento);
  }

  .signature {
    position: absolute;
    right: var(--space-4);
    bottom: var(--space-2);
    font-size: var(--type-sm);
    font-weight: 500;
    letter-spacing: 0.08em;
    color: color-mix(in srgb, var(--texto-muted) 70%, transparent);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="stage">
    <div data-isotype-container></div>
  </div>

  <div class="accent-rule"></div>

  <header class="brand">
    <div class="eyebrow">Producto</div>
    <h1 class="wordmark" data-logo-texto data-fit data-fit-min="28"></h1>
    <p class="tagline" data-subtitulo data-fit data-fit-min="12"></p>
  </header>

  <section class="content">
    <h2 class="titulo" data-titulo data-fit data-fit-min="22"></h2>
    <p class="copy" data-copy data-fit data-fit-min="11"></p>
  </section>

  <div class="signature">Eikón</div>
</body>
</html>
