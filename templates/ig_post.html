<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080, initial-scale=1">
<title>Eikon - Legacy Alias ig_post.html</title>
<link rel="stylesheet" href="./eikon-system.css">
<style>
  :root { --asset-width: 1080px; --asset-height: 1080px; }
</style>
</head>
<body data-template="instagram_post" data-variant="v1_tesis" data-brand-line="cloud">

  <main class="asset">
    <section class="brand-row">
      <span class="brand-mark" data-logo-simbolo data-fit data-fit-min="18">*</span>
      <span class="brand-name" data-logo-texto data-fit data-fit-min="10">Marca</span>
    </section>
    <section class="content">
      <div class="accent-line"></div>
      <div class="metric">
        <span class="big-number" data-numero data-fit data-fit-min="48">01</span>
        <span class="label" data-etiqueta data-fit data-fit-min="12">Etiqueta</span>
      </div>
      <h1 class="title" data-titulo data-fit data-fit-min="24" data-fit-y="true">Titulo</h1>
      <h2 class="subtitle" data-subtitulo data-fit data-fit-min="14">Subtitulo</h2>
      <p class="copy" data-copy data-fit data-fit-min="12" data-fit-y="true">Copy</p>
      <span class="button-like">Saber mas</span>
    </section>
    <section class="author-block">
      <span class="author-dot" data-logo-simbolo>*</span>
      <div>
        <div class="author-name" data-autor data-fit data-fit-min="14">Autor</div>
        <div class="author-role" data-cargo data-fit data-fit-min="10">Cargo</div>
      </div>
    </section>
    <footer class="brand-row">
      <span class="url" data-url data-fit data-fit-min="10">example.com</span>
    </footer>
  </main>

  <div class="contract-fields" aria-hidden="true">
    <span data-titulo></span>
    <span data-subtitulo></span>
    <span data-copy></span>
    <span data-logo-simbolo></span>
    <span data-logo-texto></span>
    <span data-numero></span>
    <span data-etiqueta></span>
    <span data-autor></span>
    <span data-cargo></span>
    <span data-url></span>
    <span data-acento></span>
    <span data-acento-2></span>
  </div>
<script src="./eikon-runtime.js"></script>
</body>
</html>
