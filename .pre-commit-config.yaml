repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: /workspace/Pinakotheke/eikon/.venv/bin/mypy eikon_core webapp
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
